<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JYO Assist Bot</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- AUDIENCE SELECTOR SCREEN -->
  <div id="selector-screen" class="screen active">
    <div class="selector-inner">
      <div class="logo-wrap">
        <img src="https://sanmateojyo.teamsnapsites.com/wp-content/uploads/sites/1484/2025/04/JYO-and-logomark.png" alt="JYO Logo" class="logo" />
      </div>
      <h1 class="headline">JYO Assist Bot</h1>
      <p class="subhead">Get quick answers about the league.<br/>Who are you?</p>
      <div class="audience-grid">
        <button class="audience-btn" data-audience="parent">
          <span class="audience-icon">👨‍👩‍👧</span>
          <span class="audience-label">Parent</span>
          <span class="audience-desc">Registration, events, schedules</span>
        </button>
        <button class="audience-btn" data-audience="coach">
          <span class="audience-icon">📋</span>
          <span class="audience-label">Coach</span>
          <span class="audience-desc">Gym access, equipment, rules</span>
        </button>
        <button class="audience-btn" data-audience="manager">
          <span class="audience-icon">📊</span>
          <span class="audience-label">Manager</span>
          <span class="audience-desc">Schedules, scoring, funds</span>
        </button>
        <button class="audience-btn" data-audience="leadership">
          <span class="audience-icon">🏆</span>
          <span class="audience-label">Leadership</span>
          <span class="audience-desc">Conduct, surveys, volunteers</span>
        </button>
      </div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="screen">
    <div class="chat-header">
      <button id="back-btn" title="Change audience">&#8592;</button>
      <img src="https://sanmateojyo.teamsnapsites.com/wp-content/uploads/sites/1484/2025/04/JYO-and-logomark.png" alt="JYO" class="header-logo" />
      <div class="header-text">
        <span class="header-title">JYO Assist Bot</span>
        <span id="audience-badge" class="audience-badge"></span>
      </div>
    </div>

    <div id="chat-messages" class="chat-messages">
      <div class="message bot-message" id="welcome-msg">
        <!-- populated by JS -->
      </div>
    </div>

    <div class="chat-input-wrap">
      <div class="suggestions" id="suggestions"></div>
      <div class="input-row">
        <textarea id="user-input" placeholder="Ask a question…" rows="1"></textarea>
        <button id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
